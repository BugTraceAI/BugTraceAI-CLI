services:
  api:
    build: .
    container_name: bugtrace_api
    ports:
      - "8000:8000"
    volumes:
      - cli-scans:/app/scans
      - cli-reports:/app/reports
      - cli-db:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      BUGTRACE_CORS_ORIGINS: ${BUGTRACE_CORS_ORIGINS:-http://localhost:5173,http://localhost:6869}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  mcp:
    build: .
    container_name: bugtrace_mcp
    command: ["mcp", "--sse", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    volumes:
      - cli-reports:/app/reports
      - cli-logs:/app/logs
      - cli-db:/app/data
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sS -m 2 http://localhost:8001/sse >/dev/null; res=$$?; [ $$res -eq 0 ] || [ $$res -eq 28 ] || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  cli-scans:
  cli-reports:
  cli-logs:
  cli-db:
